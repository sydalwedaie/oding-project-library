<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin | Project Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Library Management System</h1>
    </header>
    <main>
      <div class="add-book">
        <button>Add new book</button>
        <dialog closedBy="any">
          <h1>Add a new book</h1>
          <form id="add-book-form" data-book-id="">
            <input
              type="text"
              id="book-title"
              name="book-title"
              placeholder="book title"
            /><br />
            <input
              type="text"
              id="book-author"
              name="book-author"
              placeholder="book author"
            /><br />
            <input
              type="text"
              id="book-pages"
              name="book-pages"
              placeholder="number of pages"
            /><br />
            <input type="checkbox" id="book-read" name="book-read" /><br />
            <input
              type="text"
              id="book-cover"
              name="book-cover"
              placeholder="cover URL"
            /><br />
            <input type="submit" value="Submit" />
          </form>
        </dialog>
      </div>
      <div id="books-grid"></div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
